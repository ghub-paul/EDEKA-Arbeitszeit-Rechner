<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDEKA IT Arbeitszeit Rechner - Würzburg</title>
    
    <link rel="icon" type="image/png" href="https://citycenter.de/wp-content/uploads/2021/06/logo-edeka-eisenhuettenstadt.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('https://edekajens.de/wp-content/uploads/2020/11/WCI_EDEKA_Tafel_quer_ohne_Kante_CMYK_juli_2020_a4-2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; 
        }
        .container {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-wrap: wrap; 
            justify-content: space-around; 
            align-items: flex-start;
            gap: 20px; 
            margin-top: 60px; 
            margin-bottom: 80px; 
        }
        .calculator {
            width: 30%; 
            min-width: 310px; 
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            flex-grow: 1; 
        }
        h1 { text-align: center; color: #000; margin-bottom: 20px; font-size: 1.4em; border-bottom: 2px solid #FFD600; padding-bottom: 10px; }
        .info-details {
            font-size: 0.75em;
            color: #666;
            margin-bottom: 15px;
            background: #fdfdfd;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 14px; }
        input, select, button {
            box-sizing: border-box;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #FFD600;
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        button:hover { background-color: #f0c300; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff9e6;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #ffeeba;
        }
        .checkbox-group input { width: auto; margin: 0; cursor: pointer; }
        .checkbox-group label { margin: 0; cursor: pointer; font-size: 13px; font-weight: 400; line-height: 1.2; }

        .result {
            text-align: center;
            padding: 15px;
            background-color: #F8F8F8;
            border-radius: 5px;
            min-height: 45px;
            font-size: 15px;
        }
        .neutral { color: #333; background-color: #f0f0f0; border: 1px solid #ddd; }
        .negative { color: #b30000; background-color: #ffe0e0; border: 1px solid #f2dede; }
        .positive { color: #008000; background-color: #e0ffe0; border: 1px solid #dff0d8; }
        .warning-box { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; padding: 5px; font-size: 0.8em; margin-top: 10px; border-radius: 4px; font-weight: bold; }

        .header-logo { position: fixed; top: 20px; right: 20px; width: 110px; z-index: 100; }
        .footer { position: fixed; bottom: 10px; left: 10px; color: white; font-size: 11px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <img src="https://citycenter.de/wp-content/uploads/2021/06/logo-edeka-eisenhuettenstadt.png" alt="EDEKA" class="header-logo">

    <div class="container">
        <div class="calculator">
            <h1>Feierabend-Planer</h1>
            <div class="info-details">
                Mo-Do 8,42h / Fr 4,83h.<br>Pausen BV: 30m ab 6h / 45m ab 9h.
            </div>
            
            <label>Heute angefangen um:</label>
            <input type="time" id="start-time" onchange="saveStartTime()">
            
            <label>Wochentag:</label>
            <select id="day-mode">
                <option value="8.42">Montag - Donnerstag (Soll 8.42h)</option>
                <option value="4.83">Freitag (Soll 4.83h)</option>
            </select>

            <div class="checkbox-group">
                <input type="checkbox" id="breakfast-toggle">
                <label for="breakfast-toggle"><b>Frühstückspause gemacht?</b><br>Zusätzlich 25 Min. Pause.</label>
            </div>

            <button onclick="calculateFeierabend()">Berechnen</button>
            <div id="end-res" class="result neutral">Bitte Zeit eingeben</div>
        </div>

        <div class="calculator">
            <h1>Ist-Zeit Rechner</h1>
            <div class="info-details">
                Eingabe deiner Intervalle (z.B. 07:00-12:00 und 12:30-16:00).
            </div>
            <label>1. Intervall:</label>
            <div style="display:flex; gap:5px;">
                <input type="time" id="b1-s"> bis <input type="time" id="b1-e">
            </div>
            <label>2. Intervall:</label>
            <div style="display:flex; gap:5px;">
                <input type="time" id="b2-s"> bis <input type="time" id="b2-e">
            </div>
            
            <label>Tages-Soll (Dezimal):</label>
            <input type="number" id="soll-input" value="8.42" step="0.01">
            
            <button onclick="calculateIntervalWork()">Saldo berechnen</button>
            <div id="int-res" class="result neutral">Warte auf Eingabe...</div>
        </div>

        <div class="calculator">
            <h1>Dezimal-Wandler</h1>
            <label>Zeit in h:mm</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="conv-h" placeholder="Std">
                <input type="number" id="conv-m" placeholder="Min">
            </div>
            <label>Oder Dezimalwert:</label>
            <input type="number" id="conv-dec" step="0.01" placeholder="z.B. 8.42">
            
            <button onclick="handleConversion()">Umrechnen</button>
            <div id="dec-res" class="result neutral">---</div>
        </div>
    </div>

    <div class="footer">EDEKA IT Standort Würzburg | BV 2026</div>

<script>
    function saveStartTime() {
        localStorage.setItem('edeka_wue_start', document.getElementById('start-time').value);
    }

    function calculateFeierabend() {
        const start = document.getElementById('start-time').value;
        const soll = parseFloat(document.getElementById('day-mode').value);
        const hasBreakfast = document.getElementById('breakfast-toggle').checked;

        if(!start) return;

        const [h, m] = start.split(':').map(Number);
        let startMin = h * 60 + m;
        let workMin = soll * 60;

        let gesetzPause = (soll > 9) ? 45 : (soll > 6 ? 30 : 0);
        let breakfastMin = hasBreakfast ? 25 : 0;

        let totalMin = startMin + workMin + gesetzPause + breakfastMin;
        
        let endH = Math.floor(totalMin / 60) % 24;
        let endM = Math.round(totalMin % 60);
        
        let warn = (soll > 10) ? '<div class="warning-box">BV § 3.3 Warnung: > 10h Arbeitszeit!</div>' : '';

        document.getElementById('end-res').innerHTML = 
            `Geplantes Ende: <b style="font-size:1.2em;">${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')} Uhr</b>${warn}`;
    }

    function calculateIntervalWork() {
        const s1 = document.getElementById('b1-s').value;
        const e1 = document.getElementById('b1-e').value;
        const s2 = document.getElementById('b2-s').value;
        const e2 = document.getElementById('b2-e').value;
        const soll = parseFloat(document.getElementById('soll-input').value);

        const tMin = (t) => { if(!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };

        let m1 = tMin(e1) - tMin(s1); if(m1 < 0) m1 += 1440;
        let m2 = tMin(e2) - tMin(s2); if(m2 < 0) m2 += 1440;
        
        let totalNettoH = parseFloat(((m1 + m2) / 60).toFixed(2));
        let diff = parseFloat((totalNettoH - soll).toFixed(2));

        let resDiv = document.getElementById('int-res');
        
        // Farblogik korrigiert: Neutral bei 0.00
        resDiv.className = 'result';
        if (Math.abs(diff) < 0.01) {
            resDiv.classList.add('neutral');
            diff = 0; // Saubere Anzeige von 0 statt -0.0
        } else if (diff > 0) {
            resDiv.classList.add('positive');
        } else {
            resDiv.classList.add('negative');
        }
        
        let warn = totalNettoH > 10 ? '<div class="warning-box">Achtung: Tageshöchstzeit überschritten!</div>' : '';
        resDiv.innerHTML = `Ist: ${totalNettoH.toFixed(2)}h (Soll: ${soll}h)<br><b>Differenz: ${diff > 0 ? '+' : ''}${diff.toFixed(2)}h</b>${warn}`;
    }

    function handleConversion() {
        const h = document.getElementById('conv-h').value;
        const m = document.getElementById('conv-m').value;
        const dec = document.getElementById('conv-dec').value;
        let output = "---";

        if(h || m) {
            output = (parseInt(h||0) + (parseInt(m||0)/60)).toFixed(2) + " Dezimalstunden";
        } else if(dec) {
            let total = Math.round(parseFloat(dec) * 60);
            output = Math.floor(total/60) + " Std " + (total%60) + " Min";
        }
        document.getElementById('dec-res').textContent = output;
    }

    window.onload = () => {
        const saved = localStorage.getItem('edeka_wue_start');
        if(saved) {
            document.getElementById('start-time').value = saved;
            document.getElementById('b1-s').value = saved;
        }
    };
</script>
</body>
</html>
